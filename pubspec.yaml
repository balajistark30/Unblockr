name: unblockr
description: "Unblockr - AI-powered parking alerts"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  image_picker: ^1.2.1
  provider: ^6.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider:
  dotted_border: ^2.1.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  google_sign_in: ^7.2.0
  geolocator: ^13.0.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/onboarding/

flutter_launcher_icons:
  image_path: "assets/logo/unblockr_app_logo.png"

  android:
    generate: true

  ios:
    generate: true
    remove_alpha_ios: true